[pytest]
# Configuration for end-to-end integration tests against a live NITA stack.
# Run with: pytest -c pytest-integration.ini
#
# These tests require a live NITA webapp (db + jenkins + webapp containers)
# and do NOT use Django's test DB or settings module.
testpaths = tests/integration
python_files = test_*.py
markers =
    integration: end-to-end tests against a live NITA webapp instance
    screenshot(url): capture a GUI snapshot after the test passes
addopts = -ra -v

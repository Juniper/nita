kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    # Remove the default control-plane taint so NITA workloads can schedule.
    # This mirrors: kubectl taint nodes --all node-role.kubernetes.io/control-plane-
    # which install.sh runs after kubeadm init.
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          taints: []
    # Bind host directories to the paths referenced by pv.yaml (/mnt/data)
    # and pv2.yaml (/mydatai2). Kind nodes are Docker containers, so extraMounts
    # make host paths (created in the CI step) visible inside the node where
    # the PersistentVolume hostPaths resolve.
    extraMounts:
      - hostPath: /mnt/data
        containerPath: /mnt/data
      - hostPath: /mydatai2
        containerPath: /mydatai2
      - hostPath: /var/nita_project
        containerPath: /var/nita_project

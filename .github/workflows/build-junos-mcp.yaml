name: Build and push junos-mcp-server image

# Build a container image for the Junos MCP server from the upstream Juniper
# source and push it to the repo owner's GHCR namespace so that the NITA k8s
# stack can pull ghcr.io/<owner>/junos-mcp-server:latest without needing a
# local build.

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Rebuild weekly on Sundays at 02:00 UTC to pick up upstream patches.
    - cron: "0 2 * * 0"

jobs:
  build-and-push:
    name: Build junos-mcp-server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out nita repo (for workflow context only)
        uses: actions/checkout@v4

      - name: Clone Juniper/junos-mcp-server
        run: |
          git clone --depth 1 https://github.com/Juniper/junos-mcp-server.git \
            /tmp/junos-mcp-server

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: /tmp/junos-mcp-server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/junos-mcp-server:latest
          labels: |
            org.opencontainers.image.source=https://github.com/Juniper/junos-mcp-server
            org.opencontainers.image.description=Junos MCP server built for NITA

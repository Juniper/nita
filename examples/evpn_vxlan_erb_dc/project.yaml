description: EVPN VLXAN ERB Data Center
name: evpn_vxlan_erb_dc_1.4
action:
  - name: Build
    jenkins_url: build_qfx_fabric
    #must be one of NOOB, BUILD or TEST
    category: BUILD
    configuration:
      shell_command: 'write_yaml_files.py; create_ansible_job_k8s.py build; kubectl apply -f build.yaml; kubectl wait --for=jsonpath="{.status.ready}"=1 job/build --timeout=600s; kubectl logs job/build -f'

  - name: Build base config
    jenkins_url: base_qfx_fabric
    #must be one of NOOB, BUILD or TEST
    category: BUILD
    configuration:
      shell_command: 'write_yaml_files.py; create_ansible_job_k8s.py base; kubectl apply -f base.yaml; kubectl wait --for=jsonpath="{.status.ready}"=1 job/base --timeout=600s; kubectl logs job/base -f'

  - name: Dump configuration
    jenkins_url: dump_qfx_fabric
    #must be one of NOOB, BUILD or TEST
    category: BUILD
    configuration:
      shell_command: 'write_yaml_files.py; create_ansible_job_k8s.py dump; kubectl apply -f dump.yaml; kubectl wait --for=jsonpath="{.status.ready}"=1 job/dump --timeout=600s; kubectl logs job/dump -f'

  - name: Test
    jenkins_url: test_qfx_fabric
    #must be one of NOOB, BUILD or TEST
    category: TEST
    configuration:
      shell_command: 'write_yaml_files.py; robot.py job-ansible job-robot; kubectl apply -f job-ansible.yaml; kubectl wait --for=jsonpath="{.status.ready}"=1 job/job-ansible --timeout=600s; kubectl logs job/job-ansible -f; kubectl apply -f job-robot.yaml; kubectl wait --for=jsonpath="{.status.ready}"=1 job/job-robot --timeout=600s; kubectl logs job/job-robot -f'
      output_path: test/outputs
